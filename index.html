<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Swiper CSS -->
    <link rel="stylesheet"

<body>

    <!-- Header -->
    <header id="header">
<nav class="navbar">

        <!-- Menu Button -->
        <button id="menuBtn" class="nav-btn">
            ☰
        </button>

        <!-- EM Logo -->
        <div class="logo">
            <span>EM</span>
        </div>

        <!-- Admin Button -->
        <button id="adminBtn" class="nav-btn">
            ⚙
        </button>
  <!-- Side Menu -->




</nav>
    </header>
<div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>

<div id="sideMenu">

    <h2>EM STORE</h2>


    <button onclick="aboutUs()">
        ℹ️ About
    </button>

    <button onclick="showProducts()">
        🏏 Products
    </button>

    <button onclick="contactUs()">
        📞 Contact Us
    </button>

    <button onclick="openInstagram()">
        📸 Instagram
    </button>

    <button onclick="openYoutube()">
        ▶️ YouTube
    </button>
  <div class="menu-header">

    

    <button id="closeMenuBtn" onclick="closeMenu()">
        ✕
    </button>

  </div>
</div>
  

    <!-- ================= HERO SLIDER ================= -->

<section class="hero-section">

    <div class="swiper heroSwiper">

        <div class="swiper-wrapper" id="sliderWrapper">

            <!-- Backend se slider images yahan load hongi -->

        </div>

        <!-- Pagination -->
        <div class="swiper-pagination"></div>

        <!-- Navigation -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>

    </div>

</section>
